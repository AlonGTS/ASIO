[display]
show_local = false  # true only when debugging with a monitor

[tracking]
max_bb_width = 120
max_bb_height = 120

[gts-track.common]
use_hog             = true
use_color_names     = true
use_gray            = false
use_rgb             = true
use_channel_weights = true
use_segmentation    = false
window_function     = "hann"
kaiser_alpha        = 3.2
hog_clip            = 2.0
histogram_bins      = 16
background_ratio    = 2

[gts-track.fixed]
number_of_scales    = 33
scale_step          = 1.03
scale_lr            = 0.15
scale_sigma_factor  = 0.25
scale_model_max_area = 512
admm_iterations     = 9
template_size       = 160
filter_lr           = 0.08

[gts-track.moving]
number_of_scales    = 55
scale_step          = 1.02
scale_lr            = 0.65
scale_sigma_factor  = 0.30
scale_model_max_area = 1024
admm_iterations     = 6
template_size       = 200
filter_lr           = 0.25

[network]
# "wlan0" = original network, "wlan1" = new USB dongle (MAHAT)
interface = "wlan0"

[network.wlan0]
bind_ip = "192.168.1.45"
gcs_ip  = "192.168.1.255"

[network.wlan1]
bind_ip = "192.168.10.2"
gcs_ip  = "192.168.10.255"

[mavlink]
pixhawk_port  = "/dev/ttyACM0"
pixhawk_baud  = 115200
# gcs_ip is derived automatically from [network.<interface>].gcs_ip
gcs_port      = 14550
local_port    = 14551

[camera]
# Safe/default resolutions for IMX708 path
main_sizes  = [[640, 480], [960, 540], [1280, 720], [1640, 1232]]
lores_sizes = [[320, 240], [416, 312], [512, 384], [640,  480]]
